[[approval_rules]]
# Matches any gradlew command targeting the application test suite
command_pattern = "^./gradlew :magical-vibes-application:test --tests .*"
decision = "always-allow"
reason = "Allow targeted application tests to manage Gradle wrapper locks and artifacts."

[sandbox]
# Ensures the sandbox doesn't block Gradle from writing to its own build/cache dirs
mode = "relaxed"
extra_writable_paths = [
    "~/.gradle",
    "./.gradle",
    "./build"
]

[mcp_servers.scryfall]
command = "powershell.exe"
args = [
    "-NoProfile",
    "-ExecutionPolicy",
    "Bypass",
    "-File",
    "mcp/card-info/start.ps1"
]
cwd = "."
startup_timeout_sec = 10
tool_timeout_sec = 30

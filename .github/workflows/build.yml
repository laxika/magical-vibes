name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Scryfall oracle data
        uses: actions/cache@v4
        with:
          path: magical-vibes-backend/scryfall-cache
          key: scryfall-cache-${{ hashFiles('magical-vibes-card/src/main/java/**/CardSet.java') }}
          restore-keys: |
            scryfall-cache-

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build -x :magical-vibes-frontend:build -x :magical-vibes-frontend:npmInstall -x :magical-vibes-frontend:buildAngular

      - name: Test
        run: ./gradlew test

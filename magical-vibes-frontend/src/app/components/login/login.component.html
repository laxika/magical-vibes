<div class="login-container">
  <div class="login-card">
    <div class="card-header">
      <h1>Magical Vibes</h1>
    </div>

    <div class="card-body">
      <h2 class="panel-title">Sign In</h2>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            [disabled]="loading()"
            required
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            [disabled]="loading()"
            required
            autocomplete="current-password"
          />
        </div>

        @if (errorMessage()) {
          <div class="alert-error">{{ errorMessage() }}</div>
        }

        <button
          type="submit"
          [disabled]="loading() || !loginForm.form.valid"
          class="btn-login"
        >
          @if (loading()) {
            <span class="spinner"></span>
            Logging in...
          } @else {
            Log in
          }
        </button>
      </form>

      <div class="test-credentials">
        <h2 class="panel-title">Test Accounts</h2>
        @for (account of testAccounts; track account.username) {
          <button
            type="button"
            class="btn-credential"
            [disabled]="loading()"
            (click)="fillCredentials(account)"
          >
            {{ account.username }} / {{ account.password }}
          </button>
        }
      </div>
    </div>
  </div>
</div>
